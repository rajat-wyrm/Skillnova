# SkillNova AIAssistant — full stack
#
# Self-contained compose file that runs ONLY the AIAssistant module.
# Use this when you want to iterate on the AIAssistant without
# restarting the rest of the SkillNova platform.
#
#   docker compose -f aiassistant/docker-compose.yml up --build
#   docker compose -f aiassistant/docker-compose.yml down
#
# The AIAssistant listens on http://localhost:8000
# (Swagger UI at /docs).
services:
  aiassistant:
    build:
      context: ./aiassistant-backend
      dockerfile: Dockerfile
    image: skillnova-aiassistant:latest
    container_name: skillnova-aiassistant
    restart: unless-stopped
    env_file:
      - ./aiassistant-backend/.env
    environment:
      AIASSISTANT_HOST: 0.0.0.0
      AIASSISTANT_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/aiassistant/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  aiassistant-widget:
    image: node:20-alpine
    container_name: skillnova-aiassistant-widget
    working_dir: /app
    volumes:
      - ./aiassistant-widget:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    depends_on:
      - aiassistant
