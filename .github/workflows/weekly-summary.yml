name: Weekly Contribution Summary

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Weekly Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const dateStr = weekAgo.toISOString().split('T')[0];
            
            // Get commits from this week
            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: weekAgo.toISOString(),
              per_page: 100,
            });
            
            // Get PRs from this week
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });
            
            // Get issues from this week
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });
            
            const recentPRs = prs.data.filter(pr => new Date(pr.updated_at) > weekAgo);
            const recentIssues = issues.data.filter(issue => new Date(issue.updated_at) > weekAgo && !issue.pull_request);
            
            const body = `## 📊 Weekly Contribution Summary
            
            **Period:** ${dateStr} to ${now.toISOString().split('T')[0]}
            
            ### Commits
            - **Total commits this week:** ${commits.data.length}
            - **Contributors:** ${[...new Set(commits.data.map(c => c.author?.login))].length}
            
            ### Pull Requests
            - **New PRs:** ${recentPRs.filter(pr => new Date(pr.created_at) > weekAgo).length}
            - **Merged PRs:** ${recentPRs.filter(pr => pr.merged_at && new Date(pr.merged_at) > weekAgo).length}
            - **Open PRs:** ${recentPRs.filter(pr => pr.state === 'open').length}
            
            ### Issues
            - **New Issues:** ${recentIssues.filter(issue => new Date(issue.created_at) > weekAgo).length}
            - **Closed Issues:** ${recentIssues.filter(issue => issue.state === 'closed' && new Date(issue.closed_at) > weekAgo).length}
            - **Open Issues:** ${recentIssues.filter(issue => issue.state === 'open').length}
            
            ### Top Contributors
            ${commits.data.slice(0, 5).map((c, i) => `${i + 1}. @${c.author?.login || 'unknown'} - ${c.message.split('\\n')[0]}`).join('\\n')}
            
            ---
            *This summary was automatically generated by GitHub Actions.*`;
            
            console.log(body);
