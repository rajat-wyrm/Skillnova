name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: micnncim/action-label-syncer@v1
        with:
          config-file: .github/labels.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
