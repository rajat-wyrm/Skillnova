# Repository label catalogue — keep this in lockstep with label-sync.yml.
# Colourless (cccccc) labels are placeholders for milestones.
- name: "bug"
  color: "d73a4a"
  description: "Confirmed defect — see TROUBLESHOOTING.md before opening."
- name: "feature"
  color: "a2eeef"
  description: "New user-visible capability."
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation."
- name: "good first issue"
  color: "7057ff"
  description: "Suitable for first-time contributors."
- name: "help wanted"
  color: "008672"
  description: "Up-for-grabs — extra attention requested."
- name: "dependencies"
  color: "0366d6"
  description: "Pull requests that update a dependency."
- name: "ci"
  color: "e4e669"
  description: "Pull requests that update CI / build configuration."
- name: "node"
  color: "f9d0c4"
  description: "Node.js / Fastify backend changes."
- name: "python"
  color: "3572A5"
  description: "Python / FastAPI / LangGraph chatbot changes."
- name: "security"
  color: "b60205"
  description: "Security-related — disclose privately per SECURITY.md."
- name: "pinned"
  color: "fef2c0"
  description: "Locked in place — never stale-closed."
- name: "wip"
  color: "fbca04"
  description: "Work in progress — not yet ready for review."
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or PR duplicates an existing one."
- name: "invalid"
  color: "e6e6e6"
  description: "Will not be acted on."
- name: "question"
  color: "d876e3"
  description: "Further information is requested."
