# SkillNova AI Chatbot — full stack
#
# Self-contained compose file that runs ONLY the chatbot module.
# Use this when you want to iterate on the chatbot without restarting
# the rest of the SkillNova platform.
#
#   docker compose -f "ai chatbot/docker-compose.yml" up --build
#   docker compose -f "ai chatbot/docker-compose.yml" down
#
# The chatbot listens on http://localhost:8000 (Swagger at /docs).
services:
  ai-chatbot:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    image: skillnova-ai-chatbot:latest
    container_name: skillnova-ai-chatbot
    restart: unless-stopped
    env_file:
      - ./ai-backend/.env
    environment:
      SKILLNOVA_AI_HOST: 0.0.0.0
      SKILLNOVA_AI_PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-frontend:
    image: node:20-alpine
    container_name: skillnova-ai-chatbot-widget
    working_dir: /app
    volumes:
      - ./ai-frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    depends_on:
      - ai-chatbot
