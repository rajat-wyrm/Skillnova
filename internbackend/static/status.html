<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SkillNova · Status</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #fafafa;
      --muted: #a1a1aa;
      --brand: #f97316;
      --accent: #ec4899;
      --ok: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 32px 24px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 24px; margin: 0 0 4px; }
    .eyebrow { color: var(--muted); margin: 0 0 32px; font-size: 13px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px;
    }
    .card h3 {
      margin: 0 0 4px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .metric { font-size: 24px; font-weight: 600; margin: 4px 0; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .footer { margin-top: 32px; color: var(--muted); font-size: 12px; text-align: center; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>SkillNova Status</h1>
    <p class="eyebrow">Live snapshot · auto-refreshes every 10s</p>

    <div class="grid">
      <div class="card">
        <h3>Overall</h3>
        <div class="metric" id="overall">—</div>
        <div class="muted" id="overall-detail">checking…</div>
      </div>
      <div class="card">
        <h3>Uptime</h3>
        <div class="metric" id="uptime">—</div>
        <div class="muted">seconds since last start</div>
      </div>
      <div class="card">
        <h3>Components</h3>
        <div class="metric" id="components">—</div>
        <div class="muted" id="components-detail">agent + cache</div>
      </div>
      <div class="card">
        <h3>Prometheus</h3>
        <div class="metric"><a href="/api/metrics" style="color: var(--brand)">/api/metrics</a></div>
        <div class="muted">text exposition format</div>
      </div>
    </div>

    <div class="footer">
      <span class="pulse">●</span> Refreshing every 10s ·
      <a href="/docs" style="color: var(--brand)">Swagger UI</a> ·
      <a href="/health" style="color: var(--brand)">Raw health</a>
    </div>
  </div>

  <script>
    const fmt = (x) => (x ?? '—');
    const setText = (id, t) => document.getElementById(id).textContent = t;

    async function tick() {
      try {
        const r = await fetch('/api/health', { cache: 'no-store' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const body = await r.json();
        const ok = body.status === 'ok';
        setText('overall', ok ? 'HEALTHY' : body.status.toUpperCase());
        setText('overall', ok ? 'HEALTHY' : body.status.toUpperCase());
        document.getElementById('overall').className = `metric ${ok ? 'ok' : 'warn'}`;
        setText('overall-detail', `version ${body.version || 'unknown'}`);
        setText('uptime', fmt(body.uptime_s));
        const comp = body.components || {};
        const ready = Object.values(comp).filter(Boolean).length;
        const total = Object.values(comp).length;
        setText('components', `${ready}/${total}`);
        document.getElementById('components').className = `metric ${ready === total && total > 0 ? 'ok' : 'warn'}`;
        setText('components-detail', Object.entries(comp).map(([k, v]) => `${k}=${v ? '✓' : '✗'}`).join(' · '));
      } catch (e) {
        document.getElementById('overall').textContent = 'UNREACHABLE';
        document.getElementById('overall').className = 'metric bad';
        document.getElementById('overall-detail').textContent = e.message;
      }
    }

    tick();
    setInterval(tick, 10_000);
  </script>
</body>
</html>
