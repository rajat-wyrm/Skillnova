#  SkillNova — Production docker-compose
# ════════════════════════════════════════════════════════════
version: '3.9'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillnova-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${APP_URL}/api/v1
        VITE_SOCKET_URL: ${APP_URL}
    container_name: skillnova-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  # Optional nginx reverse proxy in front
  # nginx:
  #   image: nginx:alpine
  #   ...
