services:
  db:
    image: postgres:16-alpine
    container_name: skillnova-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillnova
      POSTGRES_PASSWORD: skillnova
      POSTGRES_DB: skillnova
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./internbackend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillnova -d skillnova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skillnova-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: skillnova-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://skillnova:skillnova@db:5432/skillnova
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      CSRF_SECRET: ${CSRF_SECRET:-please-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    ports: ["5000:5000"]
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads: